<!DOCTYPE html>

<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Music Recommender</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>

<body>
<header class="d-flex flex-wrap justify-content-center py-3 mb-4 bg-dark bg-gradient text-white">
    <a href="{{ url_for('index') }}" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none">
        <span class="fs-4 ps-3 text-white">Echo</span>
    </a>
    <ul class="nav nav-pills">
        <li class="nav-item">
            <a href="{{ url_for('index') }}" class="nav-link {% if request.path == '/' %}active bg-success bg-gradient{% else %}text-white{% endif %}" aria-current="page">Home</a>
        </li>
        <li class="nav-item">
            <a href="{{ url_for('liked') }}" class="nav-link {% if request.path == '/liked' %}active bg-success bg-gradient{% else %}text-white{% endif %}">My Liked Songs</a>
        </li>
    </ul>
</header>

<main class="container">
    {% block content %}{% endblock %}
</main>
</body>
</html>
