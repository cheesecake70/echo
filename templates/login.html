{% extends "base.html" %}

{% block content %}
<div class="auth-card">
    {% if error %}
        <div class="alert-retro alert-danger-retro mb-4">{{ error }}</div>
    {% endif %}
    
    <form method="POST" class="text-center">
        <div class="mb-4 text-start">
            <label class="input-label">enter username</label>
            <input type="text" class="form-control-dark" name="Username" placeholder="Enter username" required>
        </div>
        <div class="mb-4 text-start">
            <label class="input-label">enter password</label>
            <input type="password" class="form-control-dark" name="Password" placeholder="Password" required>
        </div>
        
        <button type="submit" class="btn-submit-auth w-100 mt-2" style="border-radius: 20px;">submit</button>
    </form>
    
    <p class="mt-4 text-center fs-5">
        no account? <a href="{{ url_for('register') }}" class="text-decoration-underline text-dark">register here</a>
    </p>
</div>
{% endblock %}
